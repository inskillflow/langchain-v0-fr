services:
  app:
    build: .
    image: langchain-hello-world-local:latest
    container_name: langchain-hello-world-local
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/.venv
    extra_hosts:
      # Permet au conteneur d'atteindre Ollama tournant sur l'hote.
      # Sur Windows et macOS, Docker Desktop fournit deja host.docker.internal automatiquement,
      # mais le declarer ici rend le compose portable y compris sur Linux.
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
